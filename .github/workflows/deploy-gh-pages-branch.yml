name: Deploy to gh-pages branch

on:
  push:
    branches: [master]
    paths:
      - 'prompt-builder/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build standalone app
        run: node prompt-builder/scripts/build-standalone.mjs

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./prompt-builder/dist
          force_orphan: true
